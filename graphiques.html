<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphiques - Novalyx</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg: #111827;
            --card: #1f2937;
            --text: #f9fafb;
            --primary: #6366f1;
            --secondary: #10b981;
        }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        button, select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: var(--card);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            background: var(--primary);
        }
        
        .chart-container {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .data-editor {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #374151;
        }
        
        th {
            color: #9ca3af;
        }
        
        .remove-btn {
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
        }
        
        #chart {
            min-height: 400px;
        }
        
        .back-button {
            position: fixed;
            top: 10px;
            right: 10px;
            background: var(--card);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #374151;
            color: white;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">← Retour</a>
    <div class="container">
        <h1>📊 Graphiques - Novalyx</h1>
        
        <div class="controls">
            <select id="chartType">
                <option value="bar">Histogramme</option>
                <option value="line">Courbe</option>
                <option value="area">Aire</option>
                <option value="pie">Camembert</option>
                <option value="donut">Donut</option>
            </select>
            <button onclick="updateChart()">Mettre à jour</button>
            <button onclick="addRow()">+ Ligne</button>
            <button onclick="exportPNG()">Exporter PNG</button>
            <button onclick="exportCSV()">Exporter CSV</button>
        </div>
        
        <div class="chart-container">
            <div id="chart"></div>
        </div>
        
        <div class="data-editor">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Label</th>
                        <th>Valeur</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td contenteditable="true">Janvier</td>
                        <td contenteditable="true">30</td>
                        <td><span class="remove-btn" onclick="removeRow(this)">×</span></td>
                    </tr>
                    <tr>
                        <td contenteditable="true">Février</td>
                        <td contenteditable="true">50</td>
                        <td><span class="remove-btn" onclick="removeRow(this)">×</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let chart;
        
        function getData() {
            const rows = document.querySelectorAll("#dataTable tbody tr");
            const labels = [];
            const values = [];
            rows.forEach(row => {
                labels.push(row.cells[0].textContent);
                values.push(parseFloat(row.cells[1].textContent) || 0);
            });
            return { labels, values };
        }
        
        function updateChart() {
            const { labels, values } = getData();
            const chartType = document.getElementById("chartType").value;
            const options = {
                chart: {
                    type: chartType,
                    height: 400,
                    animations: { enabled: true },
                    dropShadow: { enabled: true }
                },
                series: (chartType === "pie" || chartType === "donut") ? values : [{ name: "Données", data: values }],
                labels: labels,
                theme: { mode: 'dark', palette: 'palette1' },
                plotOptions: {
                    bar: { distributed: true },
                    pie: { donut: { labels: { show: chartType === "donut" } } }
                },
                dataLabels: { enabled: true },
                legend: { position: 'bottom' },
                xaxis: (chartType !== "pie" && chartType !== "donut") ? { categories: labels } : {}
            };
            
            if (chart) {
                chart.destroy();
            }
            
            chart = new ApexCharts(document.querySelector("#chart"), options);
            chart.render();
        }
        
        function addRow() {
            const tbody = document.querySelector("#dataTable tbody");
            const row = document.createElement("tr");
            row.innerHTML = `
                <td contenteditable="true">Nouveau</td>
                <td contenteditable="true">0</td>
                <td><span class="remove-btn" onclick="removeRow(this)">×</span></td>
            `;
            tbody.appendChild(row);
        }
        
        function removeRow(el) {
            el.closest("tr").remove();
            updateChart();
        }
        
        function exportPNG() {
            chart.dataURI().then(({ imgURI }) => {
                const link = document.createElement("a");
                link.href = imgURI;
                link.download = "graphique-novalyx.png";
                link.click();
            });
        }
        
        function exportCSV() {
            const { labels, values } = getData();
            let csv = "Label,Valeur\n";
            labels.forEach((label, i) => {
                csv += `${label},${values[i]}\n`;
            });
            const blob = new Blob([csv], { type: "text/csv" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "données-novalyx.csv";
            link.click();
        }
        
        window.addEventListener("DOMContentLoaded", updateChart);
    </script>
</body>
</html>
